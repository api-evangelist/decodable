aid: decodable
url: https://raw.githubusercontent.com/api-evangelist/decodable/refs/heads/main/apis.yml
name: Decodable
kind: company
description: Decodable is a fully managed stream-processing platform built on Apache
  Flink and Debezium. It lets teams build real-time data pipelines by connecting
  sources and sinks, transforming data with SQL or custom Flink jobs, and managing
  connections, streams, pipelines, and secrets through a REST API, a CLI, and
  declarative YAML.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Stream Processing
- Apache Flink
- Debezium
- Real Time Data
- Data Pipelines
- CDC
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
